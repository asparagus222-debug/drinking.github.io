<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品飲社群 Live</title>
    <!-- 1. 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. 引入 React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 3. 引入 Babel (讓瀏覽器直接讀懂 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 4. 引入 Lucide 圖標 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .radar-grid { stroke: #334155; stroke-width: 0.5; }
        /* 自定義按鈕縮放效果 */
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAqWTIIkkXnx5NajBDo-9zqgbU8XiEKUqU",
            authDomain: "drinking-notes.firebaseapp.com",
            projectId: "drinking-notes",
            storageBucket: "drinking-notes.firebasestorage.app",
            messagingSenderId: "850044253764",
            appId: "1:850044253764:web:b27189a2d53eadb10aae11"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'drinking-notes-v1';

        // 將 Firebase 變數掛載到 window 供 React 使用
        window.fb = { auth, db, appId, signInAnonymously, onAuthStateChanged, collection, addDoc, onSnapshot, serverTimestamp };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 建立一個圖標組件來封裝 Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    // 使用 lucide.createIcons 指定渲染
                    lucide.createIcons({
                        targets: [iconRef.current]
                    });
                }
            });
            return <i ref={iconRef} data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [records, setRecords] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [brand, setBrand] = useState('');
            const [isUploading, setIsUploading] = useState(false);

            // 登入與資料監聽
            useEffect(() => {
                const { auth, db, appId, signInAnonymously, onAuthStateChanged, collection, onSnapshot } = window.fb;
                
                signInAnonymously(auth).catch(err => console.error("Auth Error:", err));
                
                const unsubAuth = onAuthStateChanged(auth, (currUser) => {
                    if (currUser) setUser(currUser);
                });

                const recordsCol = collection(db, 'artifacts', appId, 'public', 'data', 'records');
                const unsubSnap = onSnapshot(recordsCol, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // 排序資料
                    const sorted = data.sort((a, b) => {
                        const timeA = a.timestamp?.toMillis?.() || 0;
                        const timeB = b.timestamp?.toMillis?.() || 0;
                        return timeB - timeA;
                    });
                    setRecords(sorted);
                }, (error) => {
                    console.error("Firestore Error:", error);
                });

                return () => { unsubAuth(); unsubSnap(); };
            }, []);

            const handleSave = async () => {
                if (!brand || !user) return;
                setIsUploading(true);
                const { db, appId, collection, addDoc, serverTimestamp } = window.fb;
                
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'records'), {
                        brand,
                        uid: user.uid,
                        userName: `飲者 ${user.uid.slice(0, 4).toUpperCase()}`,
                        timestamp: serverTimestamp(),
                        dateStr: new Date().toLocaleDateString()
                    });
                    setBrand('');
                    setIsModalOpen(false);
                } catch (e) { 
                    console.error("Save Error:", e);
                }
                setIsUploading(false);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative pb-24 bg-slate-50 shadow-2xl">
                    {/* Header */}
                    <header className="bg-white/90 backdrop-blur-md p-6 border-b border-slate-100 flex justify-between items-end sticky top-0 z-30">
                        <div>
                            <p className="text-[10px] font-black text-indigo-500 uppercase tracking-widest flex items-center gap-1 mb-1">
                                <Icon name="globe" size={12} className="animate-pulse" /> LIVE 雲端同步
                            </p>
                            <h1 className="text-2xl font-black text-slate-900">品飲社群</h1>
                        </div>
                        <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-[11px] font-black shadow-lg border-2 border-white">
                            {user ? user.uid.slice(0,2).toUpperCase() : "..."}
                        </div>
                    </header>

                    {/* Timeline */}
                    <main className="p-6 space-y-6">
                        {records.length === 0 ? (
                            <div className="text-center py-32 space-y-4">
                                <div className="bg-white w-20 h-20 rounded-[30px] flex items-center justify-center mx-auto shadow-sm">
                                    <Icon name="clipboard" size={32} className="text-slate-200" />
                                </div>
                                <p className="text-sm text-slate-400 font-bold tracking-wide">目前尚無筆記，快來分享吧！</p>
                            </div>
                        ) : (
                            records.map(r => (
                                <div key={r.id} className="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="flex justify-between items-start mb-2">
                                        <div className="space-y-1">
                                            <h3 className="text-lg font-black text-slate-800 tracking-tight leading-tight">{r.brand}</h3>
                                            <div className="flex items-center gap-2">
                                                <span className="text-[11px] font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-full">
                                                    {r.userName}
                                                </span>
                                                <span className="text-[10px] text-slate-300 font-medium">{r.dateStr}</span>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-1 bg-amber-50 px-2 py-1 rounded-xl">
                                            <Icon name="star" size={12} className="text-amber-400 fill-current" />
                                            <span className="text-sm font-black text-amber-600">5.0</span>
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </main>

                    {/* Floating Button */}
                    <div className="fixed bottom-0 left-0 right-0 p-6 pointer-events-none flex justify-center">
                        <button 
                            onClick={() => setIsModalOpen(true)} 
                            className="w-full max-w-[340px] h-16 bg-slate-900 text-white rounded-[24px] shadow-2xl flex items-center justify-center gap-3 pointer-events-auto btn-active transition-all hover:bg-black"
                        >
                            <div className="bg-indigo-500 p-1.5 rounded-lg">
                                <Icon name="plus" size={18} />
                            </div>
                            <span className="font-black text-sm tracking-widest uppercase">紀錄我的品飲</span>
                        </button>
                    </div>

                    {/* New Note Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 bg-white p-8 flex flex-col animate-in slide-in-from-bottom-full duration-300">
                            <div className="flex justify-between items-center mb-10">
                                <button onClick={() => setIsModalOpen(false)} className="p-2 -ml-2 text-slate-400 hover:text-slate-900">
                                    <Icon name="chevron-down" size={28} />
                                </button>
                                <h2 className="font-black text-xl tracking-tight">紀錄新發現</h2>
                                <div className="w-10"></div>
                            </div>

                            <div className="flex-1 space-y-6">
                                <div className="space-y-2">
                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">酒款名稱</label>
                                    <input 
                                        className="w-full bg-slate-50 border-2 border-transparent rounded-[24px] px-6 py-5 text-base font-bold outline-none focus:bg-white focus:border-indigo-100 focus:ring-4 focus:ring-indigo-50/50 transition-all"
                                        placeholder="例如：獺祭 三割九分" 
                                        value={brand}
                                        onChange={e => setBrand(e.target.value)}
                                        autoFocus
                                    />
                                </div>

                                <div className="bg-slate-50 rounded-[32px] p-8 text-center border-2 border-dashed border-slate-200">
                                    <Icon name="camera" size={32} className="mx-auto text-slate-300 mb-2" />
                                    <p className="text-xs font-bold text-slate-400">目前網頁版暫不支援上傳照片</p>
                                </div>
                            </div>

                            <button 
                                onClick={handleSave}
                                disabled={isUploading || !brand}
                                className={`w-full py-6 rounded-[28px] font-black tracking-widest shadow-xl transition-all ${isUploading || !brand ? 'bg-slate-100 text-slate-300 cursor-not-allowed' : 'bg-indigo-600 text-white btn-active hover:bg-indigo-700'}`}
                            >
                                {isUploading ? (
                                    <div className="flex items-center justify-center gap-2">
                                        <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                        <span>同步中...</span>
                                    </div>
                                ) : "確認發佈到社群牆"}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
