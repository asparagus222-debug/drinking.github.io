<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TasteMaster Pro - 燒酎清酒筆記</title>
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (使用更穩定的版本組合) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Prop-Types (Recharts 依賴) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- Recharts (使用 UMD 完整版) -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Web App Manifest (Inline) -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"TasteMaster Pro","short_name":"TasteMaster","start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#4f46e5","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/931/931935.png","sizes":"512x512","type":"image/png"}]}'>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="range"] { -webkit-appearance: none; background: transparent; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px; width: 20px;
            border-radius: 50%; background: #4f46e5;
            cursor: pointer; margin-top: -8px;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.3);
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            background: #e2e8f0; border-radius: 2px;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;
        
        // 安全獲取 Recharts 組件
        const { Radar, RadarChart, PolarGrid, PolarAngleAxis, ResponsiveContainer } = window.Recharts || {};

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) {
                    window.lucide.createIcons(); 
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const DATABASE = {
            breweries: ["旭酒造", "黑木本店", "濱田酒造", "高木酒造", "佐藤酒造", "西酒造"],
            brands: {
                "清酒": ["獺祭", "十四代", "而今", "新政"],
                "燒酎": ["百年の孤独", "中中", "赤兔馬", "DAIYAME", "富乃寶山", "佐藤 黑"]
            }
        };

        const SHOCHU_DEFAULTS = {
            quadrants: ["華酎", "爽酎", "醇酎", "樽酎"],
            aromas: ["花香", "果香", "原料香", "辛香料", "焦糖香", "煙燻感", "荔枝", "香蕉", "烤地瓜"],
            textures: ["圓潤", "辛口", "清爽", "黏稠", "絲滑", "清澈"],
            methods: ["直球", "加冰", "水割", "蘇打割", "湯割", "前割"]
        };

        const App = () => {
            const [category, setCategory] = useState('清酒');
            const [brand, setBrand] = useState('');
            const [brewery, setBrewery] = useState('');
            const [images, setImages] = useState([]);
            
            const [shochuQuadrants, setShochuQuadrants] = useState([]);
            const [selectedTags, setSelectedTags] = useState([]);
            const [selectedTextures, setSelectedTextures] = useState([]);
            const [selectedMethods, setSelectedMethods] = useState([]);
            const [customInputs, setCustomInputs] = useState({ aroma: '', texture: '', method: '' });
            
            const [sakeFlavor, setSakeFlavor] = useState({ 甘: 3, 酸: 3, 苦: 3, 旨: 3, 澀: 3 });
            
            const [note, setNote] = useState('');
            const [overallRating, setOverallRating] = useState(5);
            const [isSaved, setIsSaved] = useState(false);

            const toggleItem = (item, list, setter) => {
                setter(prev => prev.includes(item) ? prev.filter(i => i !== item) : [...prev, item]);
            };

            const addCustom = (type, setter) => {
                const val = customInputs[type];
                if (!val) return;
                setter(prev => [...prev, val]);
                setCustomInputs(prev => ({ ...prev, [type]: '' }));
            };

            const sakeFlavorData = useMemo(() => 
                Object.keys(sakeFlavor).map(k => ({ subject: k, A: sakeFlavor[k] })), 
            [sakeFlavor]);

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 shadow-2xl bg-white relative">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-white/80 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                                <Icon name="wine" size={18} />
                            </div>
                            <h1 className="font-black text-xl tracking-tight text-slate-900">TasteMaster</h1>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            {['清酒', '燒酎'].map(t => (
                                <button key={t} onClick={() => setCategory(t)} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${category === t ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`}>{t}</button>
                            ))}
                        </div>
                    </header>

                    <main className="p-6 space-y-8">
                        {/* 照片上傳 */}
                        <section className="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                            <label className="flex-shrink-0 w-20 h-20 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center text-slate-400 cursor-pointer active:bg-slate-100 transition-colors">
                                <Icon name="camera" />
                                <span className="text-[10px] font-bold mt-1">拍照</span>
                                <input type="file" className="hidden" accept="image/*" onChange={e => {
                                    if(e.target.files[0]) setImages([...images, URL.createObjectURL(e.target.files[0])]);
                                }} />
                            </label>
                            {images.map((img, i) => (
                                <div key={i} className="flex-shrink-0 w-20 h-20 relative">
                                    <img src={img} className="w-full h-full object-cover rounded-2xl border border-slate-100 shadow-sm" />
                                    <button onClick={() => setImages(images.filter((_, idx) => idx !== i))} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md border border-white"><Icon name="x" size={10} /></button>
                                </div>
                            ))}
                        </section>

                        {/* 基本資訊 */}
                        <section className="space-y-4">
                            <div className="grid grid-cols-2 gap-3">
                                <input className="bg-slate-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500/20 outline-none placeholder-slate-400 text-slate-700" placeholder="酒造名稱..." value={brewery} onChange={e => setBrewery(e.target.value)} />
                                <input className="bg-slate-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500/20 outline-none placeholder-slate-400 text-slate-700" placeholder="銘柄名稱..." value={brand} onChange={e => setBrand(e.target.value)} />
                            </div>
                        </section>

                        {category === '燒酎' ? (
                            <div className="space-y-8 animate-in fade-in duration-300">
                                {/* 風格象限 */}
                                <div className="space-y-3">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1"><Icon name="layers" size={12}/>風格象限 (可複選)</h2>
                                    <div className="grid grid-cols-2 gap-2">
                                        {SHOCHU_DEFAULTS.quadrants.map(q => (
                                            <button key={q} onClick={() => toggleItem(q, shochuQuadrants, setShochuQuadrants)} 
                                                className={`py-3 rounded-xl text-xs font-bold transition-all border-2 ${shochuQuadrants.includes(q) ? 'bg-indigo-600 border-indigo-600 text-white shadow-md scale-[1.02]' : 'bg-white border-slate-100 text-slate-500'}`}>{q}</button>
                                        ))}
                                    </div>
                                </div>

                                {/* 風味標籤 */}
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1"><Icon name="tag" size={12}/>風味香氣</h2>
                                        <div className="flex gap-1">
                                            <input className="text-xs border-b border-slate-200 outline-none w-16 px-1 focus:border-indigo-500 transition-colors" placeholder="自訂..." value={customInputs.aroma} onChange={e => setCustomInputs({...customInputs, aroma: e.target.value})} />
                                            <button onClick={() => addCustom('aroma', setSelectedTags)} className="text-indigo-600 active:scale-90 transition-transform"><Icon name="plus" size={14}/></button>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {SHOCHU_DEFAULTS.aromas.map(t => (
                                            <button key={t} onClick={() => toggleItem(t, selectedTags, setSelectedTags)} className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${selectedTags.includes(t) ? 'bg-amber-500 text-white shadow-sm' : 'bg-slate-100 text-slate-500'}`}>{t}</button>
                                        ))}
                                        {selectedTags.filter(t => !SHOCHU_DEFAULTS.aromas.includes(t)).map(t => (
                                            <button key={t} onClick={() => toggleItem(t, selectedTags, setSelectedTags)} className="px-3 py-1.5 rounded-full text-xs font-medium bg-amber-500 text-white italic border border-amber-300 shadow-sm">{t}</button>
                                        ))}
                                    </div>
                                </div>

                                {/* 品飲方式 */}
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1"><Icon name="cup-soda" size={12}/>品飲方式</h2>
                                        <div className="flex gap-1">
                                            <input className="text-xs border-b border-slate-200 outline-none w-16 px-1 focus:border-indigo-500 transition-colors" placeholder="自訂..." value={customInputs.method} onChange={e => setCustomInputs({...customInputs, method: e.target.value})} />
                                            <button onClick={() => addCustom('method', setSelectedMethods)} className="text-indigo-600 active:scale-90 transition-transform"><Icon name="plus" size={14}/></button>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {SHOCHU_DEFAULTS.methods.map(m => (
                                            <button key={m} onClick={() => toggleItem(m, selectedMethods, setSelectedMethods)} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border transition-all ${selectedMethods.includes(m) ? 'bg-indigo-50 border-indigo-300 text-indigo-700 shadow-sm' : 'bg-white text-slate-400 border-slate-100'}`}>{m}</button>
                                        ))}
                                        {selectedMethods.filter(m => !SHOCHU_DEFAULTS.methods.includes(m)).map(m => (
                                            <button key={m} onClick={() => toggleItem(m, selectedMethods, setSelectedMethods)} className="px-3 py-1.5 rounded-lg text-[10px] font-bold bg-indigo-50 border border-indigo-300 text-indigo-700 italic shadow-sm">{m}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            /* 清酒雷達圖與 Slider */
                            <div className="space-y-8 animate-in fade-in duration-300">
                                <div className="h-56 w-full bg-slate-50 rounded-3xl p-4 flex items-center justify-center border border-slate-100 shadow-inner">
                                    {RadarChart ? (
                                        <ResponsiveContainer width="100%" height="100%">
                                            <RadarChart data={sakeFlavorData}>
                                                <PolarGrid stroke="#e2e8f0" />
                                                <PolarAngleAxis dataKey="subject" tick={{ fill: '#64748b', fontSize: 12, fontWeight: 700 }} />
                                                <Radar dataKey="A" stroke="#4f46e5" fill="#4f46e5" fillOpacity={0.5} />
                                            </RadarChart>
                                        </ResponsiveContainer>
                                    ) : <div className="text-slate-300 text-xs font-bold">圖表加載中...</div>}
                                </div>
                                <div className="space-y-4 px-2">
                                    {Object.keys(sakeFlavor).map(k => (
                                        <div key={k} className="flex items-center gap-6">
                                            <span className="text-sm font-black text-slate-600 w-6">{k}</span>
                                            <input type="range" min="1" max="5" value={sakeFlavor[k]} className="flex-1" onChange={e => setSakeFlavor({...sakeFlavor, [k]: parseInt(e.target.value)})} />
                                            <span className="text-xs font-bold text-indigo-600 w-4">{sakeFlavor[k]}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="pt-6 border-t border-slate-100 space-y-4">
                            <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1"><Icon name="pencil" size={12}/>個人筆記心得</h2>
                            <textarea value={note} onChange={e => setNote(e.target.value)} className="w-full h-28 p-4 bg-slate-50 rounded-2xl text-sm border-none focus:ring-2 focus:ring-indigo-500/10 outline-none resize-none shadow-inner text-slate-700" placeholder="這支酒的香氣、口感表現如何？有推薦的搭餐嗎？" />
                        </div>

                        <div className="pt-4 flex items-center justify-between border-t border-slate-100">
                            <span className="text-sm font-black text-slate-700">綜合星級評價</span>
                            <div className="flex items-center gap-1.5 text-indigo-600 font-black text-2xl">
                                <Icon name="star" size={24} className="fill-current text-amber-400" />
                                {overallRating}.0
                            </div>
                        </div>
                        <input type="range" min="1" max="10" value={overallRating} className="w-full" onChange={e => setOverallRating(e.target.value)} />

                        <button onClick={() => { setIsSaved(true); setTimeout(() => setIsSaved(false), 2000); }} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-xl shadow-indigo-200 active:scale-95 transition-all flex items-center justify-center gap-2 mt-4">
                            <Icon name="save" size={20} /> 保存品飲檔案
                        </button>
                    </main>

                    {isSaved && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-md text-white px-8 py-3 rounded-full text-xs font-bold shadow-2xl animate-in slide-in-from-bottom-5 z-[60]">
                             ✨ 已成功保存至個人資料庫
                        </div>
                    )}
                </div>
            );
        };

        // 等待所有資源加載完成後渲染
        window.addEventListener('load', () => {
            const container = document.getElementById('root');
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        });

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', (e) => {});
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>
